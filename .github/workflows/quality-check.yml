name: Quality Check

# SECURITY: This workflow runs untrusted PR code, so it MUST use `pull_request`
# (not `pull_request_target`). With `pull_request`:
#   - The workflow runs in the PR's ref scope, not the base branch's.
#   - Caches written here cannot be restored by workflows on `main`.
#   - For PRs from forks, `secrets.GITHUB_TOKEN` is read-only and no other
#     secrets are exposed. There is no privilege escalation path.
# Do NOT switch back to `pull_request_target` — combined with a PR-head
# checkout it lets untrusted PR code run in the base-branch context and is a
# well-known supply-chain entry point.
on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

# Default to zero permissions; jobs opt in to what they need.
permissions: {}

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.12.1"

jobs:
  quality-check:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: ">=2.6"

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          # Key is namespaced `pr-` so it can never collide with a cache
          # produced by the release workflow on `main`. Defence in depth on
          # top of GitHub's per-ref cache scoping.
          path: .turbo
          key: turbo-pr-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            turbo-pr-${{ runner.os }}-

      - name: Build all packages
        run: |
          echo "::group::Building all packages"
          pnpm run build
          echo "::endgroup::"

      - name: Rebuild symlinks after build
        run: |
          echo "::group::Recreating CLI binary symlinks"
          pnpm install --frozen-lockfile
          echo "::endgroup::"

      - name: Generate all test projects
        run: |
          echo "::group::Generating all test projects"
          pnpm run test:gen
          echo "::endgroup::"

      - name: Verify generated fixture freshness
        run: |
          echo "::group::Verifying generated fixtures"
          pnpm run verify:generated
          echo "::endgroup::"

      - name: Run multi-runtime bundle tests
        run: |
          echo "::group::Running bundle tests on Node.js, Deno, and Bun"
          pnpm run --filter @rexeus/typeweaver test:bundle:all
          echo "::endgroup::"

      - name: Run typecheck
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"
        run: |
          echo "::group::TypeScript type checking"
          pnpm run typecheck
          echo "::endgroup::"

      - name: Check formatting
        run: |
          echo "::group::oxfmt format checking"
          pnpm run format:check
          echo "::endgroup::"

      - name: Run lint
        run: |
          echo "::group::oxlint checking"
          pnpm run lint
          echo "::endgroup::"

      - name: Run dry run publish
        run: |
          echo "::group::Dry run publishing all packages"
          pnpm run publish:dry
          echo "::endgroup::"

      - name: Run tests
        run: |
          echo "::group::Running tests"
          pnpm run test
          echo "::endgroup::"
