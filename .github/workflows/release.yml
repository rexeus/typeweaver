name: Release latest versions

on:
  push:
    branches:
      - main

# SECURITY: Deny everything by default. Each job re-grants only what it needs.
permissions: {}

# Prevent overlapping releases from racing on the same npm version.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24"

jobs:
  # ---------------------------------------------------------------------------
  # version: When pending changesets exist, open / update the "version packages"
  # PR. This job touches GitHub only (no npm, no OIDC). It MUST NOT have
  # `id-token: write` and MUST NOT publish.
  # ---------------------------------------------------------------------------
  version:
    name: Create version PR
    if: github.repository_owner == 'rexeus'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    outputs:
      has_changesets: ${{ steps.changesets.outputs.hasChangesets }}
    steps:
      - name: Checkout code repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create version PR
        id: changesets
        # NOTE: `publish` is intentionally omitted. This job never touches npm.
        # Publication happens in the separate `publish` job below, which has no
        # cache restore and thus cannot inherit any poisoned artefacts.
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # publish: When there are no pending changesets (i.e. the version PR was just
  # merged), build the packages from a clean checkout and publish to npm with
  # provenance via OIDC.
  #
  # Hardening invariants — do not relax without security review:
  #   * No `actions/cache` step in this job. Cache restore combined with
  #     `id-token: write` in the same job is a known supply-chain bridge:
  #     a poisoned cache entry would execute in the OIDC-signing context.
  #   * Top-level permissions are empty; this job grants only `id-token: write`
  #     (for npm provenance) and `contents: read`.
  #   * `persist-credentials: false` on checkout — we never need to push from
  #     here, so the actions/checkout token should not be exposed on disk.
  #   * Actions are pinned to immutable commit SHAs; floating tags can be
  #     moved by a compromised maintainer.
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to npm
    needs: version
    if: needs.version.outputs.has_changesets == 'false' && github.repository_owner == 'rexeus'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          # Deliberately no `cache: "pnpm"` — see hardening invariants above.

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Publish to npm
        run: pnpm ci:publish
        env:
          NPM_CONFIG_PROVENANCE: "true"
